name: Bootstrap Munakata NOW

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Extract application bundle
        run: |
          base64 --decode bundle.b64 > /tmp/munakata-now.tar.xz
          tar -xJf /tmp/munakata-now.tar.xz -C .
          rm -f bundle.b64 .github/workflows/bootstrap.yml
      - name: Commit application
        run: |
          git config user.name "munakata-now-bootstrap"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: build Munakata NOW v1"
          git push origin HEAD:main
