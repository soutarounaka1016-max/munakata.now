name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate packaged application
        run: |
          python - <<'PY'
          import base64, gzip, json, re
          from pathlib import Path
          chunks = []
          for path in sorted(Path('.').glob('payload-*.js')):
              match = re.search(r'push\("([A-Za-z0-9+/=]+)"\)', path.read_text())
              assert match, f'chunk not found: {path}'
              chunks.append(match.group(1))
          assert len(chunks) == 6
          html = gzip.decompress(base64.b64decode(''.join(chunks))).decode()
          data_match = re.search(r'<script id="munakata-data" type="application/json">\s*(.*?)\s*</script>', html, re.S)
          assert data_match, 'embedded data not found'
          data = json.loads(data_match.group(1))
          assert len(data['news']) >= 8
          assert len([x for x in data['news'] if x.get('priority')]) >= 3
          assert len({x['id'] for x in data['news']}) == len(data['news'])
          assert '30秒で、今日の宗像がわかる。' in html
          assert 'localStorage' in html
          print(f"OK: news={len(data['news'])}, events={len(data['events'])}")
          PY
