name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check JavaScript syntax
        run: |
          node --check highlights.js
          node --check ai-recommender.js
          node --check worker/src/index.js
      - name: Test AI Worker guards
        run: node --test worker/test/*.test.mjs
      - name: Validate packaged application and separated data
        run: |
          python - <<'PY'
          import base64, gzip, json, re
          from collections import Counter
          from datetime import date
          from pathlib import Path
          from urllib.parse import urlparse

          chunk_paths = sorted(Path('.').glob('payload-*.js'))
          assert [p.name for p in chunk_paths] == [f'payload-{n}.js' for n in range(1, 7)]
          wrapper = re.compile(r'window\.MUNAKATA_CHUNKS=\(window\.MUNAKATA_CHUNKS\|\|\[\]\);window\.MUNAKATA_CHUNKS\.push\("([A-Za-z0-9+/=]+)"\);\s*')
          chunks=[]
          for path in chunk_paths:
              match=wrapper.fullmatch(path.read_text())
              assert match, f'invalid chunk wrapper: {path}'
              chunks.append(match.group(1))
          payload=''.join(chunks)
          assert len(payload)%4==0
          html=gzip.decompress(base64.b64decode(payload,validate=True)).decode()
          assert re.match(r'\s*<!doctype html>',html,re.I) and '<html' in html

          data_match=re.search(r'<script id="munakata-data" type="application/json">\s*(.*?)\s*</script>',html,re.S)
          assert data_match
          data=json.loads(data_match.group(1))
          discoveries=json.loads(Path('discoveries.json').read_text())
          sources=json.loads(Path('sources.json').read_text())
          offers=json.loads(Path('offers.json').read_text())
          extra_offers=json.loads(Path('offers-extra.json').read_text())
          ai_config=json.loads(Path('ai-config.json').read_text())
          all_offers=offers+extra_offers
          index=Path('index.html').read_text()
          highlights=Path('highlights.js').read_text()
          ai_frontend=Path('ai-recommender.js').read_text()
          worker=Path('worker/src/index.js').read_text()
          wrangler=Path('worker/wrangler.jsonc').read_text()

          assert len(data['news'])>=8 and len(data['events'])>=5
          assert len(discoveries)>=9 and len(sources)>=12
          assert len(offers)>=5 and len(extra_offers)>=25 and len(all_offers)>=30
          assert len({x['id'] for x in discoveries})==len(discoveries)
          assert len({x['id'] for x in sources})==len(sources)
          assert len({x['id'] for x in all_offers})==len(all_offers)
          assert all(x.get('mapQuery') for x in discoveries)

          required_types={'limited_menu','event','new_product','sale_campaign'}
          counts=Counter(x['type'] for x in all_offers)
          assert required_types <= set(counts)
          assert counts['limited_menu']>=7
          assert counts['event']>=10
          assert counts['new_product']>=9
          assert counts['sale_campaign']>=7

          for item in all_offers:
              assert item['id'] and item['title'] and item['type'] in required_types
              assert item.get('summary') and item.get('region')
              date.fromisoformat(item['startDate'])
              if item.get('endDate'):
                  date.fromisoformat(item['endDate'])
                  assert item['startDate']<=item['endDate']
              else:
                  assert item['type']=='new_product' and item.get('dateLabel')
              parsed=urlparse(item['url'])
              assert parsed.scheme=='https' and parsed.netloc
              assert isinstance(item.get('verifiedByOfficial'),bool)

          endpoint=urlparse(ai_config['endpoint'])
          assert endpoint.scheme=='https'
          assert endpoint.netloc.endswith('.workers.dev')
          assert endpoint.netloc=='munakatanow.soutarou-naka-1016.workers.dev'
          assert ai_config['mode']=='ai'
          assert ai_config['version']==1

          for marker in ["const BUILD='20260723-ai1'",'highlights.css','highlights.js','ai-recommender.css','ai-recommender.js',"cache:'no-store'",'unpack(1)']:
              assert marker in index, marker
          for marker in ['googleMapsUrl','www.google.com/maps/search','福岡県宗像市','MutationObserver']:
              assert marker in highlights, marker
          for marker in ['今日の宗像おすすめ','fallback(items,prefs)','askAi(config.endpoint','validAiResult','AIへ接続できなかったため','掲載中の候補だけ']:
              assert marker in ai_frontend, marker
          for marker in ['@cf/meta/llama-3.1-8b-instruct-fast','env.AI.run','MAX_CANDIDATES=40','validateResult','Origin not allowed','候補にない事実を追加しない']:
              assert marker in worker, marker
          assert '"binding": "AI"' in wrangler
          assert 'ALLOWED_ORIGIN' in wrangler
          assert Path('ai-recommender.css').stat().st_size>1500
          assert '<script src="payload-' not in index
          assert index.count('document.open();document.write(html);document.close()')==2

          print(f"OK: discoveries={len(discoveries)}, offers={len(all_offers)}, Workers AI connected, fallback retained, counts={dict(counts)}")
          PY
