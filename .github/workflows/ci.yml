name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check JavaScript syntax
        run: |
          node --check highlights.js
          node --check ai-recommender.js
          node --check chain-explorer.js
          node --check chain-photos.js
          node --check worker/src/index.js
          node --check scripts/smoke-worker.mjs
          node --check scripts/smoke-app.mjs
      - name: Test Workers AI actions
        run: node --test worker/test/*.test.mjs
      - name: Validate packaged app, chain data, photos and AI features
        run: |
          python - <<'PY'
          import base64, gzip, json, re
          from collections import Counter
          from datetime import date
          from pathlib import Path
          from urllib.parse import urlparse

          chunk_paths=sorted(Path('.').glob('payload-*.js'))
          assert [p.name for p in chunk_paths]==[f'payload-{n}.js' for n in range(1,7)]
          wrapper=re.compile(r'window\.MUNAKATA_CHUNKS=\(window\.MUNAKATA_CHUNKS\|\|\[\]\);window\.MUNAKATA_CHUNKS\.push\("([A-Za-z0-9+/=]+)"\);\s*')
          chunks=[]
          for path in chunk_paths:
              match=wrapper.fullmatch(path.read_text())
              assert match, f'invalid chunk wrapper: {path}'
              chunks.append(match.group(1))
          html=gzip.decompress(base64.b64decode(''.join(chunks),validate=True)).decode()
          assert re.match(r'\s*<!doctype html>',html,re.I) and '<html' in html

          discoveries=json.loads(Path('discoveries.json').read_text())
          offers=json.loads(Path('offers.json').read_text())
          extra=json.loads(Path('offers-extra.json').read_text())
          chain_offers=json.loads(Path('chain-offers.json').read_text())
          chain_stores=json.loads(Path('chain-stores.json').read_text())
          chain_images=json.loads(Path('chain-images.json').read_text())
          all_offers=offers+extra+chain_offers
          ai_config=json.loads(Path('ai-config.json').read_text())
          index=Path('index.html').read_text()
          recommender=Path('ai-recommender.js').read_text()
          explorer=Path('chain-explorer.js').read_text()
          photos=Path('chain-photos.js').read_text()
          worker=Path('worker/src/index.js').read_text()
          smoke=Path('scripts/smoke-worker.mjs').read_text()
          app_smoke=Path('scripts/smoke-app.mjs').read_text()

          assert len(discoveries)>=9
          assert len(offers)+len(extra)>=30
          assert len(chain_offers)>=10 and len(chain_stores)>=6
          assert len({x['id'] for x in all_offers})==len(all_offers)
          assert len({x['id'] for x in chain_stores})==len(chain_stores)
          required_brands={'マクドナルド','スターバックス','ミスタードーナツ','モスバーガー'}
          assert required_brands <= {x['brand'] for x in chain_stores}
          assert required_brands <= set(chain_images)
          counts=Counter(x['type'] for x in chain_offers)
          assert counts['limited_menu']>=4
          assert counts['event']>=2
          assert counts['new_product']>=2
          assert counts['sale_campaign']>=1

          store_ids={x['id'] for x in chain_stores}
          for store in chain_stores:
              assert store['name'] and store['address'] and store['mapQuery']
              parsed=urlparse(store['url']);assert parsed.scheme=='https' and parsed.netloc
              assert store['verifiedByOfficial'] is True
          for item in chain_offers:
              assert item['id'] and item['title'] and item['summary']
              assert item['type'] in {'limited_menu','event','new_product','sale_campaign'}
              date.fromisoformat(item['startDate'])
              if item.get('endDate'):
                  date.fromisoformat(item['endDate']);assert item['startDate']<=item['endDate']
              else:
                  assert item.get('dateLabel')
              assert set(item['chainStoreIds']) <= store_ids
              parsed=urlparse(item['url']);assert parsed.scheme=='https' and parsed.netloc
              assert item['verifiedByOfficial'] is True
              assert len(item.get('tagsSeed',[]))>=2
          for brand,image in chain_images.items():
              assert brand in required_brands
              for key in ('url','alt','sourceUrl','credit','license','emoji'):
                  assert image.get(key), f'{brand}: missing {key}'
              image_url=urlparse(image['url']);source_url=urlparse(image['sourceUrl'])
              assert image_url.scheme=='https' and image_url.netloc=='commons.wikimedia.org'
              assert source_url.scheme=='https' and source_url.netloc=='commons.wikimedia.org'
              assert 'イメージ写真' in image['alt']

          endpoint=urlparse(ai_config['endpoint'])
          assert endpoint.netloc=='munakatanow.soutarou-naka-1016.workers.dev'
          assert ai_config['mode']=='ai'

          for marker in ["const BUILD='20260724-photo1'",'chain-explorer.css','chain-explorer.js','chain-photos.css','chain-photos.js','ai-recommender.js']:
              assert marker in index, marker
          for marker in ['chain-offers.json','MAX_AI_CANDIDATES=12',"action:'recommend'",'地域店とチェーン店']:
              assert marker in recommender, marker
          for marker in ['今日のAIランキング','AI要約・タグ','選択した情報をAI比較',"action:'enrich'","action:'rank'","action:'compare'"]:
              assert marker in explorer, marker
          for marker in ['chain-images.json','MutationObserver','loading=\'lazy\'','chain-photo-credit','イメージ写真']:
              assert marker in photos, marker
          for marker in ["const VERSION='20260723-ai4'",'features:[\'recommend\',\'enrich\',\'rank\',\'compare\']','enrichSchema','rankSchema','compareSchema','UNKNOWN_ACTION']:
              assert marker in worker, marker
          for marker in ["expectedVersion='20260723-ai4'","action:'enrich'","action:'rank'","action:'compare'"]:
              assert marker in smoke, marker
          for marker in ['chain-photo[data-loaded="true"]','photo credits missing','loaded chain photos too few']:
              assert marker in app_smoke, marker
          assert Path('chain-explorer.css').stat().st_size>3000
          assert Path('chain-photos.css').stat().st_size>1000
          assert index.count('document.open();document.write(html);document.close()')==2
          print(f"OK: chain photos={len(chain_images)}, stores={len(chain_stores)}, offers={len(chain_offers)}, counts={dict(counts)}")
          PY

  smoke-worker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify all Workers AI actions
        env:
          AI_ENDPOINT: https://munakatanow.soutarou-naka-1016.workers.dev/
          SMOKE_ATTEMPTS: '36'
          SMOKE_DELAY_MS: '10000'
        run: node scripts/smoke-worker.mjs

  smoke-app:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate, smoke-worker]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Playwright WebKit
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps webkit
      - name: Verify chain photos and AI controls in public app
        env:
          APP_URL: https://soutarounaka1016-max.github.io/munakata.now/
          APP_SMOKE_ATTEMPTS: '24'
          APP_SMOKE_DELAY_MS: '10000'
        run: node scripts/smoke-app.mjs
