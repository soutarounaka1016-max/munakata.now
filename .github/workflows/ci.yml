name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate packaged application and separated data
        run: |
          python - <<'PY'
          import base64, gzip, json, re
          from pathlib import Path

          chunks = []
          for path in sorted(Path('.').glob('payload-*.js')):
              text = path.read_text()
              match = re.fullmatch(r'window\.MUNAKATA_CHUNKS=\(window\.MUNAKATA_CHUNKS\|\|\[\]\);window\.MUNAKATA_CHUNKS\.push\("([^"]+)"\);\s*', text)
              assert match, f'invalid chunk wrapper: {path}'
              chunk = match.group(1)
              assert re.fullmatch(r'[A-Za-z0-9+/=]+', chunk), f'invalid base64 characters: {path}'
              chunks.append(chunk)

          assert len(chunks) == 6
          payload = ''.join(chunks)
          assert len(payload) % 4 == 0, f'invalid base64 length: {len(payload)}'
          packed = base64.b64decode(payload, validate=True)
          html = gzip.decompress(packed).decode()

          data_match = re.search(r'<script id="munakata-data" type="application/json">\s*(.*?)\s*</script>', html, re.S)
          assert data_match, 'embedded data not found'
          data = json.loads(data_match.group(1))
          discoveries = json.loads(Path('discoveries.json').read_text())
          sources = json.loads(Path('sources.json').read_text())
          index = Path('index.html').read_text()

          assert len(data['news']) >= 8
          assert len(data['events']) >= 5
          assert len(discoveries) >= 9
          assert len(sources) >= 12
          assert len({x['id'] for x in data['news']}) == len(data['news'])
          assert len({x['id'] for x in discoveries}) == len(discoveries)
          assert len({x['id'] for x in sources}) == len(sources)
          assert all(x.get('region') for x in discoveries)
          assert all('indoor' in x and 'family' in x for x in discoveries)
          assert any(x.get('verifiedByOfficial') for x in discoveries)
          assert any(x.get('kind') == 'discovery' for x in sources)
          assert any(x.get('kind') == 'official' for x in sources)

          for marker in [
              '宗像の「行ってみたい」が見つかる。',
              '宗像の楽しい情報源',
              'areaFilters',
              'featureFilters',
              'weekendFilters',
              'discoveryStatuses',
              'discoveries.json',
              'sources.json',
              'OpenStreetMap',
              'localStorage',
          ]:
              assert marker in html, marker

          for number in range(1, 7):
              assert f'payload-{number}.js?v=20260722-safari-fix1' in index
          assert 'chunks.length!==6' in index
          assert 'replace(/[^A-Za-z0-9+' in index
          assert 'atob(payload)' in index

          print(f"OK: news={len(data['news'])}, events={len(data['events'])}, discoveries={len(discoveries)}, sources={len(sources)}, payload={len(payload)}")
          PY
