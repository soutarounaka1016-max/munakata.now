<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f766e"><title>むなかたNOW</title></head>
<body><main id="boot" style="font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;display:grid;place-items:center;background:#f4f7f6;color:#15302d"><p>むなかたNOWを読み込み中…</p></main>
<script src="payload.js"></script>
<script>
const PAYLOAD=window.MUNAKATA_PAYLOAD;
(async()=>{
  if (!("DecompressionStream" in globalThis)) throw new Error("このブラウザは展開機能に対応していません。SafariまたはChromeを最新版にしてください。");
  const bytes=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
  const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
  const html=await new Response(stream).text();
  document.open();document.write(html);document.close();
})().catch(error=>{document.querySelector("#boot").innerHTML=`<section style="max-width:36rem;padding:2rem"><h1>読み込みに失敗しました</h1><p>${error.message}</p><button onclick="location.reload()">再読み込み</button></section>`;console.error(error);});
</script></body></html>
